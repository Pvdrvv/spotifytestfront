<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Login</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

    <main class="login-wrapper">
        <section class="login-card">
            <div class="profile-header">
                <img src="assets/user-avatar.jpg" alt="Avatar" class="avatar-img">
            </div>

            <form class="auth-form">
                <div class="input-field">
                    <label>Usuario</label>
                    <input type="text" spellcheck="false">
                </div>

                <div class="input-field">
                    <label>Senha</label>
                    <input type="password">
                </div>

                <div class="social-buttons">
                    <button type="button" class="btn-black">
                        <img src="assets/google-icon.png" alt=""> Google
                    </button>
                    <button type="button" class="btn-black">
                        <img src="assets/apple-icon.png" alt=""> Apple
                    </button>
                </div>

                <a href="index.html" style="text-decoration: none; width: 100%;">
                 <button type="button" class="btn-main-green">Sing Up</button>
                </a>
                
                <p class="helper-text">Ja tem uma conta? <a href="#">Faça login.</a></p>
            </form>
        </section>

        <div class="fullscreen-bg">
            <img src="images/caroline.jpg" alt="Caroline Polachek">
            <p class="credits">desire i want to turn into you, Caroline Polachek</p>
        </div>
    </main>

</body>
</html>
