<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Stats</title>
  <link rel="stylesheet" href="stats.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">

      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="#">Assinar</a>
        <a href="#">Notícias</a>
        <a href="stats.html">Meus Stats</a>
      </nav>
    </header>

    <main class="stats-card">
      <section class="profile-column">
        <img class="avatar" src="" alt="Avatar do usuário" />
        <h2 class="username">Usuário</h2>

        <div class="profile-buttons">
          <button id="shareInstagram" type="button">Share on Instagram</button>
          <button id="shareX" type="button">Share on X</button>
          <button id="generateWrapped" type="button">Generate Wrapped</button>
          <button id="loginSpotify" class="login-btn" type="button">Login com Spotify</button>
        </div>
      </section>

      <section class="list-column">
        <h3>Top Albums</h3>
        <div id="albumsContainer">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </section>

      <section class="list-column">
        <h3>Top Musics</h3>
        <div id="tracksContainer">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </section>
    </main>

    <section class="wrapped-section">
      <div id="wrappedCard" class="wrapped-card hidden">
        <div class="wrapped-header">
          <p class="wrapped-label">Your Wrapped</p>
          <h2 class="wrapped-name">Usuário</h2>
        </div>

        <div class="wrapped-top-track">
          <img class="wrapped-top-image" src="" alt="">
          <div class="wrapped-top-info">
            <span>Top Track</span>
            <h3 class="wrapped-top-title">---</h3>
            <p class="wrapped-top-artist">---</p>
          </div>
        </div>

        <div class="wrapped-list">
          <h4>Top 5 Tracks</h4>
          <div id="wrappedTracks"></div>
        </div>
      </div>
    </section>
  </div>

  <div id="loader">
    <div class="spinner"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="spotify.js"></script>
</body>
</html>
